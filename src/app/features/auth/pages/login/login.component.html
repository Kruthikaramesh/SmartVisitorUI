<!-- ── AURORA BACKGROUND ── -->
<div class="aurora">
  <div class="aurora-blob a1"></div>
  <div class="aurora-blob a2"></div>
  <div class="aurora-blob a3"></div>
</div>
<div class="grid-overlay"></div>
<div class="particles">
  <div class="p"></div><div class="p"></div><div class="p"></div>
  <div class="p"></div><div class="p"></div><div class="p"></div>
</div>
<div class="scan-line"></div>
<div class="corner c-tl"></div>
<div class="corner c-tr"></div>
<div class="corner c-bl"></div>
<div class="corner c-br"></div>
<div class="wave-wrap">
  <svg viewBox="0 0 1440 70" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <path d="M0,35 C360,70 1080,0 1440,35 L1440,70 L0,70 Z" fill="rgba(26,111,232,0.05)" />
    <path d="M0,50 C480,18 960,62 1440,50 L1440,70 L0,70 Z" fill="rgba(14,175,168,0.06)" />
  </svg>
</div>

<!-- ══════════════════════ LOGIN CONTAINER ══════════════════════ -->
<div class="login-container">
  <div class="login-card">

    <!-- LOGO -->
    <div class="card-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
      </div>
      <span class="brand-name">SmartVisitor</span>
    </div>

    <!-- HEADING -->
    <h2 class="card-heading">Welcome <em>Back</em></h2>

    <p class="card-sub">
      Sign in to your SmartVisitor account
    </p>

   

    <!-- ERROR BANNER -->
    <div class="error-banner" *ngIf="errorMessage">
      <svg viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="10" />
        <line x1="12" y1="8" x2="12" y2="12" />
        <line x1="12" y1="16" x2="12.01" y2="16" />
      </svg>
      {{ errorMessage }}
    </div>

    <!-- FORM -->
    <form class="login-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="input-group">
        <label class="input-label" for="email">Email Address</label>

        <div class="input-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round">
              <path d="M4 4h16v16H4z" />
              <polyline points="4 6 12 13 20 6" />
            </svg>
          </span>

          <input id="email"
                 class="input-field"
                 [class.is-invalid]="submitted && f['email'].errors"
                 type="email"
                 formControlName="email"
                 placeholder="Enter your email"
                 autocomplete="email" />
        </div>

        <div class="field-error" *ngIf="submitted && f['email'].errors?.['required']">
          Email is required
        </div>

        <div class="field-error" *ngIf="submitted && f['email'].errors?.['email']">
          Enter a valid email address
        </div>
      </div>


      <!-- PASSWORD -->
      <div class="input-group">
        <label class="input-label" for="password">Password</label>
        <div class="input-wrap">

          <!-- left icon -->
          <span class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round">
              <rect x="3" y="11" width="18" height="11" rx="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
          </span>

          <!-- input — padded right so text never hides under the eye button -->
          <input id="password"
                 class="input-field has-toggle"
                 [class.is-invalid]="submitted && f['password'].errors"
                 [type]="showPassword ? 'text' : 'password'"
                 formControlName="password"
                 placeholder="Enter your password"
                 autocomplete="current-password" />

          <!-- ✅ FIX 2 — eye toggle sits inside the input on the right -->
          <button type="button"
                  class="toggle-pass"
                  (click)="togglePassword()"
                  [title]="showPassword ? 'Hide password' : 'Show password'">

            <!-- Eye open -->
            <svg *ngIf="!showPassword"
                 viewBox="0 0 24 24" fill="none"
                 stroke="black" stroke-width="2" stroke-linecap="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>

            <!-- Eye off -->
            <svg *ngIf="showPassword"
                 viewBox="0 0 24 24" fill="none"
                 stroke="black" stroke-width="2" stroke-linecap="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
              <line x1="1" y1="1" x2="23" y2="23" />
            </svg>

          </button>
        </div>
        <div class="field-error" *ngIf="submitted && f['password'].errors?.['required']">
          Password is required
        </div>
      </div>
      <!-- FORGOT PASSWORD -->
      <div class="forgot-password">
        <a href="javascript:void(0)" (click)="onForgotPassword()">
          Forgot Password?
        </a>
      </div>

      <!-- RESET PASSWORD (OPTIONAL UI SECTION) -->
      <!-- RESET PASSWORD (FIXED - NO NESTED FORM) -->
      <div class="reset-password" *ngIf="showResetPassword">

        <h3>Reset Password</h3>

        <div class="input-group">
          <label>Email</label>
          <input type="email"
                 [(ngModel)]="resetEmail"
                 name="resetEmail"
                 placeholder="Enter your email"
                 required />
        </div>

        <button type="button"
                class="login-btn"
                (click)="onResetPassword()">
          Send Reset Link
        </button>

        <div class="field-error" *ngIf="resetMessage">
          {{ resetMessage }}
        </div>

      </div>

      <!-- ✅ FIX 1 — button disabled + greyed out until both fields have values -->
      <button class="login-btn"
              type="submit"
              [disabled]="!isFormFilled || loading"
              [class.btn-ready]="isFormFilled && !loading">

        <span class="btn-content">
          <span class="spinner" *ngIf="loading"></span>
          <span>{{ loading ? 'Signing in…' : 'Sign In' }}</span>
        </span>

      </button>

    </form>

    <!-- DIVIDER -->
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">SmartVisitor 1.0</span>
      <div class="divider-line"></div>
    </div>

    <!-- FOOTER -->
    <div class="card-footer">
      <div class="online-dot"></div>
      <span>Powered by SmartVisitor © 2026</span>
    
      
    </div>

  </div>
</div>
