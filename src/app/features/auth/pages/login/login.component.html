<!-- ── BACKGROUND ── -->
<div class="aurora">
    <div class="aurora-blob a1"></div>
    <div class="aurora-blob a2"></div>
    <div class="aurora-blob a3"></div>
</div>
<div class="grid-overlay"></div>
<div class="particles">
    <div class="p"></div><div class="p"></div><div class="p"></div>
    <div class="p"></div><div class="p"></div><div class="p"></div>
</div>
<div class="scan-line"></div>
<div class="corner c-tl"></div><div class="corner c-tr"></div>
<div class="corner c-bl"></div><div class="corner c-br"></div>
<div class="wave-wrap">
    <svg viewBox="0 0 1440 70" preserveAspectRatio="none">
        <path d="M0,35 C360,70 1080,0 1440,35 L1440,70 L0,70 Z" fill="rgba(26,111,232,0.05)" />
        <path d="M0,50 C480,18 960,62 1440,50 L1440,70 L0,70 Z" fill="rgba(14,175,168,0.06)" />
    </svg>
</div>

<!-- ── CARD ── -->
<div class="login-container">
    <div class="login-card">

        <!-- LOGO -->
        <div class="card-logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                    <polyline points="9 22 9 12 15 12 15 22" />
                </svg>
            </div>
            <span class="brand-name">Visit Dwarpal</span>
        </div>

        <h2 class="card-heading">Welcome <em>Back</em></h2>
        <p class="card-sub">Sign in to continue</p>

        <!-- PASSWORD RESET SUCCESS BANNER -->
        <div *ngIf="resetSuccess" style="
      display:flex; align-items:center; gap:8px;
      padding:10px 14px; border-radius:10px;
      background:rgba(34,197,94,0.08); border:1px solid rgba(34,197,94,0.2);
      margin-bottom:1rem; font-size:0.78rem; color:var(--success);">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="20 6 9 17 4 12" />
            </svg>
            Password reset successfully. Please sign in.
        </div>

        <!-- ERROR BANNER -->
        <div class="error-banner" *ngIf="errorMessage">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="12" />
                <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
            {{ errorMessage }}
        </div>

        <!-- FORM -->
        <form class="login-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">

            <!-- EMAIL -->
            <div class="input-group">
                <label class="input-label" for="login-email">Email Address</label>
                <div class="input-wrap">
                    <span class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                            <polyline points="22,6 12,13 2,6" />
                        </svg>
                    </span>
                    <input id="login-email"
                           type="email"
                           class="input-field"
                           formControlName="email"
                           placeholder="you@example.com"
                           autocomplete="email"
                           [class.is-invalid]="f['email']?.invalid && submitted" />
                </div>
                <div class="field-error" *ngIf="submitted && f['email']?.hasError('required')">
                    Email is required
                </div>
                <div class="field-error" *ngIf="submitted && f['email']?.hasError('email')">
                    Enter a valid email address
                </div>
            </div>

            <!-- PASSWORD -->
            <div class="input-group">
                <label class="input-label" for="login-password">Password</label>
                <div class="input-wrap">
                    <span class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                        </svg>
                    </span>
                    <input id="login-password"
                           [type]="showPassword ? 'text' : 'password'"
                           class="input-field has-toggle"
                           formControlName="password"
                           placeholder="••••••••"
                           autocomplete="current-password"
                           [class.is-invalid]="f['password']?.invalid && submitted" />
                    <button type="button" class="toggle-pass" (click)="togglePassword()" tabindex="-1">
                        <svg *ngIf="!showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                        <svg *ngIf="showPassword" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
                            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
                            <line x1="1" y1="1" x2="23" y2="23" />
                        </svg>
                    </button>
                </div>
                <div class="field-error" *ngIf="submitted && f['password']?.hasError('required')">
                    Password is required
                </div>
                <div class="field-error" *ngIf="submitted && f['password']?.hasError('minlength')">
                    Password must be at least 6 characters
                </div>
            </div>

            <!-- FORGOT PASSWORD LINK -->
            <div style="text-align:right; margin-top:-4px; margin-bottom:12px;">
                <span class="forgot-link" (click)="onForgotPassword()">
                    Forgot password?
                </span>
            </div>

            <!-- SUBMIT -->
            <button type="submit"
                    class="login-btn"
                    [class.btn-ready]="isFormFilled && !loading"
                    [disabled]="loading">
                <span class="btn-content">
                    <span class="spinner" *ngIf="loading"></span>
                    <span>{{ loading ? 'Signing In...' : 'Sign In' }}</span>
                </span>
            </button>

        </form>

        <!-- FOOTER -->
        <div class="divider">
            <div class="divider-line"></div>
            <span class="divider-text">secure access</span>
            <div class="divider-line"></div>
        </div>

        <div class="card-footer">
            <div class="online-dot"></div>
            Systems Operational
        </div>

    </div>
</div>
