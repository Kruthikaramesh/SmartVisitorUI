<!-- ── BACKGROUND ── -->
<div class="aurora">
  <div class="aurora-blob a1"></div>
  <div class="aurora-blob a2"></div>
  <div class="aurora-blob a3"></div>
</div>
<div class="grid-overlay"></div>
<div class="particles">
  <div class="p"></div><div class="p"></div><div class="p"></div>
  <div class="p"></div><div class="p"></div><div class="p"></div>
</div>
<div class="scan-line"></div>
<div class="corner c-tl"></div><div class="corner c-tr"></div>
<div class="corner c-bl"></div><div class="corner c-br"></div>
<div class="wave-wrap">
  <svg viewBox="0 0 1440 70" preserveAspectRatio="none">
    <path d="M0,35 C360,70 1080,0 1440,35 L1440,70 L0,70 Z" fill="rgba(26,111,232,0.05)" />
    <path d="M0,50 C480,18 960,62 1440,50 L1440,70 L0,70 Z" fill="rgba(14,175,168,0.06)" />
  </svg>
</div>

<!-- ── CARD ── -->
<div class="login-container">
  <div class="login-card">

    <!-- LOGO -->
    <div class="card-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
      </div>
      <span class="brand-name">Visit Dwarpal</span>
    </div>

    <h2 class="card-heading">Verify <em>Code</em></h2>
    <p class="card-sub">Sent to {{ maskedEmail }}</p>

    <!-- ERROR BANNER -->
    <div class="error-banner" *ngIf="errorMsg">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ errorMsg }}
    </div>

    <!-- SUCCESS RESEND BANNER -->
    <div *ngIf="resendMsg" style="
      display:flex; align-items:center; gap:8px;
      padding:10px 14px; border-radius:10px;
      background:rgba(34,197,94,0.08); border:1px solid rgba(34,197,94,0.2);
      margin-bottom:1rem; font-size:0.78rem; color:var(--success);">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      {{ resendMsg }}
    </div>

    <!-- FORM -->
    <form class="login-form" [formGroup]="form" (ngSubmit)="submit()">

      <div class="input-group">
        <label class="input-label" for="otp-input">6-Digit Code</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input
            id="otp-input"
            type="text"
            inputmode="numeric"
            class="input-field"
            formControlName="otp"
            placeholder="e.g. 482916"
            maxlength="6"
            autocomplete="one-time-code"
            [class.is-invalid]="otp?.invalid && otp?.touched"
            style="letter-spacing: 0.3em; font-size: 1.1rem; font-weight: 600;"
          />
        </div>
        <div class="field-error" *ngIf="otp?.touched && otp?.hasError('required')">
          Code is required
        </div>
        <div class="field-error" *ngIf="otp?.touched && otp?.hasError('pattern')">
          Enter the 6-digit code exactly as received
        </div>
      </div>

      <button
        type="submit"
        class="login-btn"
        [class.btn-ready]="isReady"
        [disabled]="!isReady"
      >
        <span class="btn-content">
          <span class="spinner" *ngIf="loading"></span>
          <span>{{ loading ? 'Verifying...' : 'Verify Code' }}</span>
        </span>
      </button>

    </form>

    <!-- DIVIDER -->
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">didn't receive it?</span>
      <div class="divider-line"></div>
    </div>

    <!-- RESEND / BACK -->
    <div class="card-footer" style="gap:16px;">
      <span
        style="cursor:pointer; text-decoration:underline"
        (click)="resendCode()"
      >
        <span class="spinner" *ngIf="resending" style="width:10px;height:10px;border-width:1.5px;"></span>
        {{ resending ? 'Sending...' : 'Resend Code' }}
      </span>
      <span style="opacity:0.4">·</span>
      <span style="cursor:pointer; text-decoration:underline" (click)="goBack()">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Back
      </span>
    </div>

  </div>
</div>
