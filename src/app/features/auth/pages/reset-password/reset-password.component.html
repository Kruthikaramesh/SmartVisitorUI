<!-- ── BACKGROUND ── -->
<div class="aurora">
    <div class="aurora-blob a1"></div>
    <div class="aurora-blob a2"></div>
    <div class="aurora-blob a3"></div>
</div>
<div class="grid-overlay"></div>
<div class="particles">
    <div class="p"></div><div class="p"></div><div class="p"></div>
    <div class="p"></div><div class="p"></div><div class="p"></div>
</div>
<div class="scan-line"></div>
<div class="corner c-tl"></div><div class="corner c-tr"></div>
<div class="corner c-bl"></div><div class="corner c-br"></div>
<div class="wave-wrap">
    <svg viewBox="0 0 1440 70" preserveAspectRatio="none">
        <path d="M0,35 C360,70 1080,0 1440,35 L1440,70 L0,70 Z" fill="rgba(26,111,232,0.05)" />
        <path d="M0,50 C480,18 960,62 1440,50 L1440,70 L0,70 Z" fill="rgba(14,175,168,0.06)" />
    </svg>
</div>

<!-- ── CARD ── -->
<div class="login-container">
    <div class="login-card">

        <!-- LOGO -->
        <div class="card-logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                    <polyline points="9 22 9 12 15 12 15 22" />
                </svg>
            </div>
            <span class="brand-name">Visit Dwarpal</span>
        </div>

        <h2 class="card-heading">New <em>Password</em></h2>
        <p class="card-sub">Setting for {{ maskedEmail }}</p>

        <!-- ERROR BANNER -->
        <div class="error-banner" *ngIf="errorMsg">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="12" />
                <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
            {{ errorMsg }}
        </div>

        <!-- FORM -->
        <form class="login-form" [formGroup]="form" (ngSubmit)="submit()">

            <!-- NEW PASSWORD -->
            <div class="input-group">
                <label class="input-label" for="rp-new">New Password</label>
                <div class="input-wrap">
                    <span class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                        </svg>
                    </span>
                    <input id="rp-new"
                           [type]="showNewPwd ? 'text' : 'password'"
                           class="input-field has-toggle"
                           formControlName="newPassword"
                           placeholder="At least 8 characters"
                           [class.is-invalid]="newPassword?.invalid && newPassword?.touched" />
                    <button type="button" class="toggle-pass" (click)="showNewPwd = !showNewPwd" tabindex="-1">
                        <svg *ngIf="!showNewPwd" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                        <svg *ngIf="showNewPwd" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
                            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
                            <line x1="1" y1="1" x2="23" y2="23" />
                        </svg>
                    </button>
                </div>
                <div class="field-error" *ngIf="newPassword?.touched && newPassword?.hasError('required')">
                    Password is required
                </div>
                <div class="field-error" *ngIf="newPassword?.touched && newPassword?.hasError('minlength')">
                    Password must be at least 8 characters
                </div>
            </div>

            <!-- CONFIRM PASSWORD -->
            <div class="input-group">
                <label class="input-label" for="rp-confirm">Confirm Password</label>
                <div class="input-wrap">
                    <span class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 12l2 2 4-4" />
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                        </svg>
                    </span>
                    <input id="rp-confirm"
                           [type]="showConfirmPwd ? 'text' : 'password'"
                           class="input-field has-toggle"
                           formControlName="confirmPassword"
                           placeholder="Re-enter password"
                           [class.is-invalid]="confirmPassword?.touched && form.hasError('mismatch')" />
                    <button type="button" class="toggle-pass" (click)="showConfirmPwd = !showConfirmPwd" tabindex="-1">
                        <svg *ngIf="!showConfirmPwd" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                        <svg *ngIf="showConfirmPwd" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
                            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
                            <line x1="1" y1="1" x2="23" y2="23" />
                        </svg>
                    </button>
                </div>
                <div class="field-error" *ngIf="confirmPassword?.touched && form.hasError('mismatch')">
                    Passwords do not match
                </div>
            </div>

            <button type="submit"
                    class="login-btn"
                    [class.btn-ready]="isReady"
                    [disabled]="!isReady">
                <span class="btn-content">
                    <span class="spinner" *ngIf="loading"></span>
                    <span>{{ loading ? 'Resetting...' : 'Reset Password' }}</span>
                </span>
            </button>

        </form>

        <!-- FOOTER -->
        <div class="divider">
            <div class="divider-line"></div>
            <span class="divider-text">or</span>
            <div class="divider-line"></div>
        </div>

        <div class="card-footer" style="cursor:pointer" routerLink="/auth/login">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="15 18 9 12 15 6" />
            </svg>
            Back to Login
        </div>

    </div>
</div>
