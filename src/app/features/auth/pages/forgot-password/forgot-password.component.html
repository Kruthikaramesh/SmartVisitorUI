<!-- ── BACKGROUND ── -->
<div class="aurora">
    <div class="aurora-blob a1"></div>
    <div class="aurora-blob a2"></div>
    <div class="aurora-blob a3"></div>
</div>
<div class="grid-overlay"></div>
<div class="particles">
    <div class="p"></div><div class="p"></div><div class="p"></div>
    <div class="p"></div><div class="p"></div><div class="p"></div>
</div>
<div class="scan-line"></div>
<div class="corner c-tl"></div><div class="corner c-tr"></div>
<div class="corner c-bl"></div><div class="corner c-br"></div>
<div class="wave-wrap">
    <svg viewBox="0 0 1440 70" preserveAspectRatio="none">
        <path d="M0,35 C360,70 1080,0 1440,35 L1440,70 L0,70 Z" fill="rgba(26,111,232,0.05)" />
        <path d="M0,50 C480,18 960,62 1440,50 L1440,70 L0,70 Z" fill="rgba(14,175,168,0.06)" />
    </svg>
</div>

<!-- ── CARD ── -->
<div class="login-container">
    <div class="login-card">

        <!-- LOGO -->
        <div class="card-logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                    <polyline points="9 22 9 12 15 12 15 22" />
                </svg>
            </div>
            <span class="brand-name">SmartVisitor</span>
        </div>

        <h2 class="card-heading">Forgot <em>Password?</em></h2>
        <p class="card-sub">Enter your email — we'll send a 6-digit code</p>

        <!-- ERROR BANNER -->
        <div class="error-banner" *ngIf="errorMsg">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="12" />
                <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
            {{ errorMsg }}
        </div>

        <!-- FORM -->
        <form class="login-form" [formGroup]="form" (ngSubmit)="submit()">

            <div class="input-group">
                <label class="input-label" for="fp-email">Email Address</label>
                <div class="input-wrap">
                    <span class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                            <polyline points="22,6 12,13 2,6" />
                        </svg>
                    </span>
                    <input id="fp-email"
                           type="email"
                           class="input-field"
                           formControlName="email"
                           placeholder="you@example.com"
                           [class.is-invalid]="email?.invalid && email?.touched" />
                </div>
                <div class="field-error" *ngIf="email?.touched && email?.hasError('required')">
                    Email is required
                </div>
                <div class="field-error" *ngIf="email?.touched && email?.hasError('email')">
                    Enter a valid email address
                </div>
            </div>

            <button type="submit"
                    class="login-btn"
                    [class.btn-ready]="isReady"
                    [disabled]="!isReady">
                <span class="btn-content">
                    <span class="spinner" *ngIf="loading"></span>
                    <span>{{ loading ? 'Sending Code...' : 'Send Reset Code' }}</span>
                </span>
            </button>

        </form>

        <!-- DIVIDER -->
        <div class="divider">
            <div class="divider-line"></div>
            <span class="divider-text">or</span>
            <div class="divider-line"></div>
        </div>

        <!-- FOOTER -->
        <div class="card-footer" style="cursor:pointer" (click)="goToLogin()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="15 18 9 12 15 6" />
            </svg>
            Back to Login
        </div>

    </div>
</div>
