<!-- ── CANVAS ── -->
<canvas #bgCanvas class="canvas-bg"></canvas>

<!-- ── AURORA ── -->
<div class="aurora">
    <div class="aurora-layer aurora-1"></div>
    <div class="aurora-layer aurora-2"></div>
    <div class="aurora-layer aurora-3"></div>
    <div class="aurora-layer aurora-4"></div>
</div>

<!-- ── GRID ── -->
<div class="grid-overlay"></div>

<!-- ── BLOBS ── -->
<div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
</div>

<!-- ── SHAPES ── -->
<div class="geo-shapes">
    <div class="geo geo-circle"></div>
    <div class="geo geo-square"></div>
    <div class="geo geo-triangle"></div>
    <div class="geo geo-circle"></div>
    <div class="geo geo-square"></div>
</div>

<!-- ── PARTICLES ── -->
<div class="particles">
    <div class="p"></div><div class="p"></div><div class="p"></div>
    <div class="p"></div><div class="p"></div><div class="p"></div>
</div>



<!-- ── CURSOR GLOW ── -->
<div #cursorGlow class="cursor-glow"></div>

<!-- ── CORNERS ── -->
<div class="corner-deco corner-tl"></div>
<div class="corner-deco corner-tr"></div>
<div class="corner-deco corner-bl"></div>
<div class="corner-deco corner-br"></div>

<!-- ═════════ MAIN SCREEN ═════════ -->
<div class="screen">

    <!-- TOP BAR -->
    <div class="top-bar">
        <div class="logo-zone">
            <div class="logo-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                    <polyline points="9 22 9 12 15 12 15 22" />
                </svg>
            </div>

            <div>
                <div class="brand-name">
                    SmartVisitor <span class="live-badge">LIVE</span>
                </div>
                <div class="brand-sub">Visitor Experience Platform</div>
            </div>
        </div>

        <div class="datetime">
            <div class="clock-display">{{ clock }}</div>
            <div class="date-display">{{ date }}</div>
        </div>
    </div>

    <!-- HERO -->
    <div class="hero">

        <h1 class="welcome-heading">
            Welcome to SmartVisitor,<br />
            <em>{{ greetingWord }}!</em>
        </h1>

        <p class="subtitle">
            Please select an option to continue.
        </p>

        <!-- BUTTON -->
        <button class="btn-primary" (click)="handleClick($event, 'check-in')">
            Get Started →
        </button>

       

    </div> <!-- ✅ FIXED: hero closed properly -->
    <!-- BOTTOM BAR -->
    <div class="bottom-bar">
        <div class="status">
            <div class="dot"></div>
            System Status: Online
        </div>
  

    </div>

</div>
